services:
  postgres:
    image: postgres:16-alpine
    container_name: ecommerce-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ecommerce}
      POSTGRES_USER: ${POSTGRES_USER:-ecommerce}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ecommerce}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${POSTGRES_USER:-ecommerce} -d ${POSTGRES_DB:-ecommerce}',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ecommerce-network

  products-service:
    build:
      context: .
      dockerfile: docker/products-service.Dockerfile
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${PRODUCTS_SERVICE_PORT:-3001}
      DATABASE_URL: ${PRODUCTS_DATABASE_URL:-postgresql://ecommerce:ecommerce@postgres:5432/ecommerce}
    ports:
      - '${PRODUCTS_SERVICE_PORT:-3001}:3001'
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3001/health || exit 1']
      interval: 15s
      timeout: 5s
      retries: 10
    networks:
      - ecommerce-network

  orders-service:
    build:
      context: .
      dockerfile: docker/orders-service.Dockerfile
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${ORDERS_SERVICE_PORT:-3002}
      DATABASE_URL: ${ORDERS_DATABASE_URL:-postgresql://ecommerce:ecommerce@postgres:5432/ecommerce}
      PRODUCTS_SERVICE_URL: ${ORDERS_PRODUCTS_SERVICE_URL:-http://products-service:3001}
    ports:
      - '${ORDERS_SERVICE_PORT:-3002}:3002'
    depends_on:
      postgres:
        condition: service_healthy
      products-service:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3002/health || exit 1']
      interval: 15s
      timeout: 5s
      retries: 10
    networks:
      - ecommerce-network

  api-gateway:
    build:
      context: .
      dockerfile: docker/api-gateway.Dockerfile
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${API_GATEWAY_PORT:-3000}
      PRODUCTS_SERVICE_URL: ${API_GATEWAY_PRODUCTS_SERVICE_URL:-http://products-service:3001}
      ORDERS_SERVICE_URL: ${API_GATEWAY_ORDERS_SERVICE_URL:-http://orders-service:3002}
    ports:
      - '${API_GATEWAY_PORT:-3000}:3000'
    depends_on:
      products-service:
        condition: service_healthy
      orders-service:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3000/health || exit 1']
      interval: 15s
      timeout: 5s
      retries: 10
    networks:
      - ecommerce-network

volumes:
  postgres_data:

networks:
  ecommerce-network:
